# ==============================================================================
# CloudOps v2 Umbrella Helm Values
# ==============================================================================
# 구성 원칙 (v2 monolith):
#   - core: 단일 monolith chart. 환경별 default 는 core chart 의 values.yaml 이
#           들고 있고, umbrella 는 enable 만 하거나 매 배포마다 바뀌는 값
#           (image / DATABASE_HOST / secret) 만 helm install 시 -f / --set 으로
#           override.
#   - nats / redis: 인프라 subchart. 자기 chart values 가 정본.
#   - postgresql: 외부 RDS — subchart 없음.
#
# 매 배포마다 채우는 값은 ``values-deploy.example.yaml`` 참고 (gitignore 권장).
#
# 설치 예 (private OCI chart 라 GHCR login 필요):
#   helm registry login ghcr.io -u <gh-user> --password-stdin
#   helm dependency update deploy/helm
#   helm upgrade --install cloudops deploy/helm \
#     -n cloudopsv2 --create-namespace \
#     -f /tmp/values-deploy.yaml
# ==============================================================================

# ── 전역(공용) 값 ──────────────────────────────────────────────────────────
# 모든 subchart 가 공유하는 값. helm 의 표준 메커니즘에 따라 subchart 의
# ``.Values.global`` 으로 자동 주입된다.
#
# ``namespace`` 정책:
#   - core / nats / redis 는 release namespace 에 install (helm install -n <ns>).
#   - plugin namespace 는 helper 가 ``{global.namespace}-plugin`` 으로 자동 derive
#     (예: global.namespace=cloudopsv2 → plugin namespace=cloudopsv2-plugin).
#   - 두 namespace 모두 templates/namespaces.yaml 가 자동 생성한다.
global:
  namespace: "cloudopsv2"

# ── 인프라 subchart ────────────────────────────────────────────────────────
redis:
  enabled: true

nats:
  enabled: true

# SeaweedFS (all-in-one) — Temporal claim-check object storage.
# 서비스명 `seaweedfs` 가 곧 S3 엔드포인트 (seaweedfs.<ns>:8333). 인증(s3.config)의
# 실제 accessKey/secretKey 는 values-deploy(gitignore) 또는 ESO existingSecret 으로 주입.
seaweedfs:
  enabled: true

# ── core (monolith) ────────────────────────────────────────────────────────
# core chart 의 values.yaml 이 cloudopsv2 namespace 기준의 안전한 default 를
# 모두 들고 있다. umbrella 는 dependency on/off 만 결정하고, 매 배포마다
# 바뀌는 값 (image / DATABASE_HOST / secret) 은 ``values-deploy.example.yaml``
# 을 참고해 helm install 시 -f / --set 으로 주입한다.
core:
  enabled: true
  # 마이그레이션 정책이 확정될 때까지 alembic pre-install/upgrade hook 비활성화.
  # 활성화가 필요하면 환경별 values 에서 `core.migration.enabled: true` 로 override.
  migration:
    enabled: false
  # Temporal claim-check codec — 대용량 collect payload 를 SeaweedFS(S3)로 offload.
  # 비민감값(enable/endpoint/bucket/region)만 여기서. endpoint 는 seaweedfs 서비스
  # (global.namespace 와 일치해야 함). ACCESS/SECRET KEY 는 SM(SDK-fetch)에서 읽으므로
  # SECRETS_MANAGER_NAME 의 secret 에 TEMPORAL_CLAIMCHECK_ACCESS_KEY / _SECRET_KEY 가
  # 있어야 하며, 그 값이 seaweedfs identity 와 동일해야 한다.
  env: &claimcheckEnv
    TEMPORAL_CLAIMCHECK_ENABLED: "true"
    TEMPORAL_CLAIMCHECK_ENDPOINT_URL: "http://seaweedfs.cloudopsv2:8333"
    TEMPORAL_CLAIMCHECK_BUCKET: "cloudops-claimcheck"
    TEMPORAL_CLAIMCHECK_REGION: "us-east-1"

# ── plugin: AWS resource collector ────────────────────────────────────────
# umbrella 는 enable/disable 만. namespace 는 global.namespace 로부터 helper 가
# 자동 derive 하고, NATS_URL 도 자동 도출되므로 별도 키 불필요. 이미지 / 그 외 env
# override 는 helm install -f values-deploy.yaml 또는 --set 으로 주입.
plugin-aws-resource-collector:
  enabled: true
  # collect_resources 가 반환하는 대용량 payload 를 offload — core 와 동일 codec 설정.
  env: *claimcheckEnv

plugin-azure-resource-collector:
  enabled: true
  env: *claimcheckEnv

plugin-gcp-resource-collector:
  enabled: true
  env: *claimcheckEnv

plugin-aws-phd-mon-webhook:
  enabled: true

plugin-aws-sns-mon-webhook:
  enabled: false

plugin-email-noti-protocol:
  enabled: true

plugin-prometheus-mon-webhook:
  enabled: true

plugin-grafana-mon-webhook:
  enabled: true

plugin-aws-cloudwatch-mon-webhook:
  enabled: true
