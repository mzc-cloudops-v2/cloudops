name: Make CloudOps Chart

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build chart from'
        required: false
        default: 'master'
        type: string
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: read

env:
  GHCR_ORG: mzc-cloudops-v2
  GHCR_PREFIX: charts

jobs:
  cloudops_chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
          # chart-releaser 가 origin/gh-pages 를 참조하려면 모든 ref 가
          # 필요하다. fetch-depth=0 으로 전체 history + remote refs 를 받는다.
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v3.14.0'

      - name: Update Chart.yaml version
        run: |
          cd deploy/helm
          sed -i "s/^version:.*/version: ${{ inputs.version }}/" Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ inputs.version }}\"/" Chart.yaml
          echo "Updated Chart.yaml:"
          head -10 Chart.yaml

      - name: Commit version update
        run: |
          git config user.email "cloudops-admin@mz.co.kr"
          git config user.name "cloudops-admin"
          git add deploy/helm/Chart.yaml
          if git diff --staged --quiet; then
            echo "Chart.yaml already at ${{ inputs.version }} — skipping commit."
          else
            git commit -m "Bump cloudops chart version to ${{ inputs.version }}"
            git push origin ${{ inputs.branch }}
          fi

      - name: Login to GHCR
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Pull dependencies from GHCR
        run: |
          cd deploy/helm
          echo "Pulling all service chart dependencies from GHCR..."
          helm dependency update
          echo "Dependencies:"
          helm dependency list

      - name: Package CloudOps chart
        run: |
          rm -rf .deploy
          mkdir -p .deploy
          helm package deploy/helm --destination .deploy
          echo "Packaged cloudops chart:"
          ls -la .deploy/
          # 이후 gh-pages checkout 이 workspace 를 갈아끼우므로 tgz 를
          # workspace 밖 영구 위치로 backup. legacy 와 동일 패턴.
          mkdir -p /tmp/cr-packages
          cp .deploy/*.tgz /tmp/cr-packages/
          echo "Backed up to /tmp/cr-packages:"
          ls -la /tmp/cr-packages/

      # cr (chart-releaser) CLI 를 직접 호출한다. 이전엔
      # helm/chart-releaser-action@v1.6.0 wrap 을 썼는데, 그 wrap 의
      # cr.sh line 109 에 `latest_tag: unbound variable` 버그가 있어서
      # `mark_as_latest` 값과 무관하게 매번 죽었다. legacy 의
      # `CI_make_helm_chart.yaml` 와 동일하게 cr CLI 만 사용해 회피.
      #
      # 사용자 흐름:
      #   helm repo add cloudops https://mzc-cloudops-v2.github.io/cloudops
      #   helm repo update
      #   helm install cloudops cloudops/mzc-cloudops-v2 --version <X.Y.Z>
      #
      # 사전 준비 (한 번만): repo Settings → Pages → Source = `gh-pages`
      # branch / `/ (root)`. 브랜치는 이미 out-of-band 로 만들어 둠.
      - name: Configure git identity
        run: |
          git config user.email "cloudops-admin@mz.co.kr"
          git config user.name "cloudops-admin"

      - name: Install chart-releaser (cr) CLI
        run: |
          curl -sSLo cr.tar.gz "https://github.com/helm/chart-releaser/releases/download/v1.6.1/chart-releaser_1.6.1_linux_amd64.tar.gz"
          tar -xzf cr.tar.gz
          sudo mv cr /usr/local/bin/
          rm -f cr.tar.gz
          cr version

      - name: Upload chart tarballs to GitHub Releases
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cr upload \
            --owner "${{ github.repository_owner }}" \
            --git-repo "$(basename ${{ github.repository }})" \
            --package-path /tmp/cr-packages \
            --token "$CR_TOKEN" \
            --skip-existing

      # `cr index --push` 모드는 자체 git worktree 를 만들면서 atomic write
      # 임시파일 path 처리에서 깨진다 (v1.6.1 quirk:
      # `open .cr-index/index.yaml<random>: no such file or directory`).
      # legacy `CI_make_helm_chart.yaml` 와 동일하게 gh-pages 를 별도
      # 디렉토리에 actions/checkout 으로 받고, cr index 는 `--push` 없이
      # 단순 호출, 그 다음 git push 는 수동으로 처리한다.
      - name: Checkout gh-pages worktree
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1

      - name: Update index.yaml on gh-pages
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: gh-pages
        run: |
          cr index \
            -i ./index.yaml \
            -p /tmp/cr-packages \
            -o "${{ github.repository_owner }}" \
            -r "$(basename ${{ github.repository }})" \
            --token "$CR_TOKEN"

          if git diff --quiet; then
            echo "index.yaml unchanged — nothing to commit"
          else
            git config user.email "cloudops-admin@mz.co.kr"
            git config user.name "cloudops-admin"
            git add index.yaml
            git commit -m "Update index.yaml for ${{ inputs.version }}"
            git pull --rebase origin gh-pages
            git push origin gh-pages
          fi

  notification:
    needs: cloudops_chart
    runs-on: ubuntu-latest
    if: always()
    steps:
      # custom_payload 방식 — action-slack 의 fields: 는 commit/job/took 을 GitHub API
      # 로 조회해 actions:read 권한을 요구하므로(이 워크플로우 permissions 는
      # contents:write/packages:read) "Resource not accessible by integration" 위험.
      # 직접 payload 는 API 호출이 없어 권한 문제 없이 동작한다.
      - name: Slack notification
        uses: 8398a7/action-slack@v3.19.0
        with:
          status: custom
          custom_payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ needs.cloudops_chart.result == 'success' && '✅ CloudOps Chart Published' || needs.cloudops_chart.result == 'cancelled' && '🟡 CloudOps Chart Cancelled' || '🔴 CloudOps Chart Failed' }}",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*📦 Repository*\n`${{ github.repository }}`" },
                    { "type": "mrkdwn", "text": "*🔀 Ref*\n`${{ github.ref_name }}`" },
                    { "type": "mrkdwn", "text": "*👤 Author*\n${{ github.actor }}" },
                    { "type": "mrkdwn", "text": "*📊 Result*\n${{ needs.cloudops_chart.result }}" },
                    { "type": "mrkdwn", "text": "*🚀 Workflow*\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>" }
                  ]
                },
                { "type": "divider" }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_DEPLOY_HELM_NOTI_WEBHOOK_URL }}
