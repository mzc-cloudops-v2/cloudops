# ==============================================================================
# CloudOps Umbrella Helm Chart Values
# ==============================================================================
# 설치 가이드:
#   - [CUSTOM REQUIRED] 항목은 반드시 환경에 맞게 수정
#   - [OPTIONAL] 항목은 환경에 따라 선택적으로 설정
#   - anchor(&name) 는 아래 서비스 블록에서 <<: *name 으로 참조됨
# ==============================================================================

common:
  # [ADVANCED] 특정 노드에 파드를 할당해야 할 경우 사용
  node_selector: &commonNodeSelector {}

  # [OPTIONAL] 코어 서비스 이미지 pull 시 사용할 imagePullSecrets
  image_pull_secret: &imagePullSecret []

  # 공통 non-sensitive env — 서비스 ConfigMap 으로 주입
  shared_env: &sharedEnv
    DATABASE_HOST: "postgresql.cloudops.svc.cluster.local"
    DATABASE_PORT: "5432"
    DATABASE_NAME: "cloudops"
    REDIS_HOST: "redis.cloudops.svc.cluster.local"
    REDIS_PORT: "6379"
    NATS_URL: "nats://nats.cloudops.svc.cluster.local:4222"
    LOG_LEVEL: "INFO"

  # 공통 sensitive env — 서비스 Secret 으로 주입
  # [CUSTOM REQUIRED] 실제 배포 전 값을 교체
  shared_secret: &sharedSecret
    DATABASE_USERNAME: "admin"
    DATABASE_PASSWORD: "changeme"
    SYSTEM_TOKEN: "changeme"

  # 공통 런타임 conf — 서비스 ConfigMap 으로 /opt/cloudops/shared.yaml 에 마운트
  # (현재는 비어있음. 추후 handlers/connectors 등이 여기에 들어간다)
  shared_conf: &sharedConf {}

# ------------------------------------------------------------------------------
# 이미지 버전
# ------------------------------------------------------------------------------
images:
  # [CUSTOM REQUIRED] Default Service
  redis: &redisImage
    repository: redis
    tag: "7.4.0"
  nats: &natsImage
    repository: nats
    tag: "2.10.0"
  postgresql: &postgresqlImage
    repository: postgres
    tag: "16"

  # [CUSTOM REQUIRED] Core Service
  skeleton: &skeletonImage
    repository: <ECR_REGISTRY>/cloudops-dev/skeleton
    tag: "1.0.0"

# ==============================================================================
# Default Service
# ==============================================================================
redis:
  enabled: true
  image:
    <<: *redisImage

nats:
  enabled: true
  image:
    <<: *natsImage

postgresql:
  enabled: false
  image:
    <<: *postgresqlImage
  auth:
    username: admin
    password: password
    database: cloudops
  pvc:
    storageClassName: ""
    storage: 10Gi

# ==============================================================================
# Core Service
# ==============================================================================
skeleton:
  enabled: true
  image:
    <<: *skeletonImage
  imagePullSecrets: *imagePullSecret
  pod:
    spec:
      nodeSelector: *commonNodeSelector
  env:
    <<: *sharedEnv
    PACKAGE_NAME: "cloudops.skeleton"
  secret:
    <<: *sharedSecret
  conf:
    <<: *sharedConf
