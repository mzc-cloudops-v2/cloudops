{{- if and .Values.enabled (eq (include "core.shouldCreateSecret" .) "true") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "core.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "core.labels" . | indent 4 }}
  annotations:
    # migration Job (pre-install hook, weight=-1) 의 envFrom 이 본 Secret 을
    # 참조하므로 hook 으로 만들고 weight 를 더 작게 둔다.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
type: Opaque
stringData:
{{- range $k, $v := .Values.secret.data }}
{{- if $v }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
{{- end }}
