{{- if and .Values.enabled .Values.env }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "core.fullname" . }}-env
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "core.labels" . | indent 4 }}
  annotations:
    # migration Job (pre-install hook, weight=-1) 의 envFrom 이 본 ConfigMap 을
    # 참조하므로 hook 으로 만들고 weight 를 더 작게 둔다.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
data:
  # TEMPORAL_ADDRESS 는 helper 가 global.namespace 기반으로 자동 도출(또는
  # .Values.temporalAddress override). values.env 에 TEMPORAL_ADDRESS 를 두지 않는다.
  TEMPORAL_ADDRESS: {{ include "core.temporalAddress" . | quote }}
  # SECRETS_MANAGER_NAME / _REGION — SDK-direct 스위치.
  # 우선순위: values.env 의 non-empty 값 > global.secretsManager* > 빈 값(env 모드).
  # umbrella 는 global 한 줄(global.secretsManagerName / global.secretsManagerRegion)
  # 로 core·plugin 공용 주입, 개별 override 는 values.env 로. ConfigMap 은 중복 키를
  # 허용하지 않으므로 여기서 유효값을 한 번만 방출하고, 아래 range 는 이 두 키를 건너뛴다.
  # 값이 있으면 base settings 가 부팅 시 AWS Secrets Manager 에서 민감값을 읽고
  # (SDK-direct), 비면 SM source 자체가 안 붙어 기존 env 모드로 100% 동작
  # (on-prem / 고객 설치형 fallback 보존).
  {{- $globalName := "" }}
  {{- if and .Values.global .Values.global.secretsManagerName }}{{ $globalName = .Values.global.secretsManagerName }}{{ end }}
  {{- $smName := default $globalName .Values.env.SECRETS_MANAGER_NAME }}
  SECRETS_MANAGER_NAME: {{ $smName | quote }}
  {{- $globalRegion := "" }}
  {{- if and .Values.global .Values.global.secretsManagerRegion }}{{ $globalRegion = .Values.global.secretsManagerRegion }}{{ end }}
  {{- $smRegion := default $globalRegion .Values.env.SECRETS_MANAGER_REGION }}
  SECRETS_MANAGER_REGION: {{ $smRegion | quote }}
{{- range $k, $v := .Values.env }}
{{- if not (or (eq $k "SECRETS_MANAGER_NAME") (eq $k "SECRETS_MANAGER_REGION")) }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
{{- end }}
