# ==============================================================================
# CloudOps v2 Umbrella — 배포 시점 override 예시
# ==============================================================================
# 사용 방법:
#   1) 본 파일을 복제해 ``values-deploy.yaml`` 등 의미 있는 이름으로 저장.
#   2) ``<...>`` 자리의 placeholder 를 실제 값으로 채운다 (값은 git 에 X).
#   3) helm install 시 -f 으로 전달:
#
#      helm registry login ghcr.io -u <gh-user> --password-stdin
#      helm dependency update deploy/helm
#      helm upgrade --install cloudops deploy/helm \
#        -n cloudopsv2 --create-namespace \
#        -f /tmp/values-deploy.yaml
#
# 또는 GitLab CI 에서 protected variables 로 override (둘이 등가):
#   helm upgrade --install cloudops deploy/helm \
#     -n cloudopsv2 --create-namespace \
#     --set core.image.repository=$ECR_REGISTRY/cloudops-v2-dev/core \
#     --set core.image.tag=$IMAGE_TAG \
#     --set core.env.DATABASE_HOST=$RDS_HOST \
#     --set core.secret.data.DATABASE_USERNAME=$DB_USER \
#     --set core.secret.data.DATABASE_PASSWORD=$DB_PASSWORD \
#     --set core.secret.data.SYSTEM_TOKEN=$SYSTEM_TOKEN
#
# placeholder 표기:
#   <ECR_REGISTRY>           예: 580126104304.dkr.ecr.ap-northeast-2.amazonaws.com
#   <IMAGE_TAG>              예: 0.0.1.20260508.173246
#   <RDS_HOST>               예: cloudops-v2-dev.xxxx.ap-northeast-2.rds.amazonaws.com
#   <DB_USERNAME>            RDS master username
#   <DB_PASSWORD>            RDS master password
#   <SYSTEM_TOKEN>           앱 내부 시스템 토큰 (`openssl rand -hex 32` 등)
#   <KMS_KEY_ARN>            예: arn:aws:kms:ap-northeast-2:<acct>:key/<uuid>
#   <AWS_ACCESS_KEY_ID>      secret 도메인이 KMS / Secrets Manager 호출 시 사용
#   <AWS_SECRET_ACCESS_KEY>
# ==============================================================================

core:
  image:
    repository: "<ECR_REGISTRY>/cloudops-v2-dev/core"
    tag: "<IMAGE_TAG>"

  env:
    # 외부 RDS endpoint
    DATABASE_HOST: "<RDS_HOST>"

    # 다른 namespace 사용 시 cluster-local svc DNS 도 override (cloudopsv2 면 생략 가능)
    # REDIS_HOST: "redis.<namespace>.svc.cluster.local"
    # NATS_URL:   "nats://nats.<namespace>.svc.cluster.local:4222"

    # NATS JetStream stream retention (TPM-652). chart default = base 의
    # CloudOpsBaseSettings default (max_age=3d / max_bytes=5GB). 디스크 capacity
    # 또는 보존 윈도우를 환경별로 조정해야 할 때만 override.
    #   - NATS_STREAM_MAX_AGE_SECONDS: 메시지 보존 기간 (초). 예: 7일 = 604800
    #   - NATS_STREAM_MAX_BYTES: stream 당 최대 디스크 사용량 (바이트). 7 stream
    #     공통값이라 총 사용량은 (값 × 7). NATS PVC capacity 에 맞춰 산정.
    # NATS_STREAM_MAX_AGE_SECONDS: "604800"
    # NATS_STREAM_MAX_BYTES:       "10737418240"   # 10 GB

  # Cron scheduler 활성화 (TPM-130). main core deployment (REST/NATS, replicas=N)
  # 와 같은 image 를 쓰는 별도 ``core-scheduler`` deployment 를 띄운다.
  # ``replicas: 1`` 강제 — 분산 환경에서 cron 중복 발화 방지 (leader-election 없음).
  #
  # ``paths`` 는 도메인 cron 모듈 dotted-path 목록. core 0.1.7 subchart 의
  # default 가 이미 daily-collect (``collection_job.adapter.inbound.scheduler``)
  # 를 포함하므로 운영자는 ``enabled: true`` 만 주면 된다. 추가 cron 도메인이
  # 생기면 그 모듈 경로를 append (default 와 합쳐지지 않으므로 default 도 함께
  # 다시 명시해야 한다).
  #
  # ``jobs`` 는 ``@task(name=...)`` 키 기반 per-job override dict (TPM-130). 코드
  # default 가 정답인 경우엔 키 자체를 생략하고, 환경별로 바꾸고 싶은 필드만 명시
  # 한다. base 의 ``ScheduledJobOverride`` (extra='forbid') 가 부팅 시 알 수 없는
  # 키를 ValidationError 로 거른다.
  #
  # 7 필드 override 화이트리스트 — 모두 optional. 미지정 시 ``@task`` spec default:
  #   cron               : 5-field cron 표현식 (예: "*/5 * * * *", "0 1 * * *")
  #                        CronTrigger.from_crontab 이 부팅 시 유효성 검증.
  #   enabled            : false 면 add_job 단계에서 skip — 일시 비활성화 용도.
  #   timezone           : CronTrigger TZ (예: "UTC", "Asia/Seoul").
  #                        미지정 시 settings.scheduler_timezone (default Asia/Seoul).
  #   misfire_grace_time : 발화 시각 누락 허용(초). 이내면 실행, 초과면 misfire.
  #   max_instances      : 동일 job 동시 인스턴스 상한 (default 1).
  #   coalesce           : true 면 밀린 다중 발화를 한 번으로 합침 (default true).
  #   jitter_sec         : 발화 시각에 더할 임의 jitter (초). 분산 부하 분산용.
  #
  # 매칭 키 = ``@task(name=...)``. 현재 등록된 도메인 job:
  #   - daily-collect    (cloudops.core.resource.collection_job, spec: "0 1 * * *" Asia/Seoul)
  scheduler:
    enabled: true
    # paths:
    #   - cloudops.core.resource.collection_job.adapter.inbound.scheduler
    #   - cloudops.core.<other_context>.<other_domain>.adapter.inbound.scheduler

    # 환경별 cron / 활성화 override 예시 — 필요한 필드만 채워 사용.
    # jobs:
    #   daily-collect:
    #     cron: "*/5 * * * *"        # dev 만 5분 단위로 자주 수집
    #     timezone: "UTC"
    #     jitter_sec: 30
    #   # 일시 비활성화 패턴 (운영 중 무단 발화 차단)
    #   # daily-collect:
    #   #   enabled: false
    #   # 동시성/지각 발화 정책 조정 패턴
    #   # heavy-cleanup:
    #   #   max_instances: 1
    #   #   coalesce: true
    #   #   misfire_grace_time: 300

  # 비밀값 — 둘 중 하나 사용:
  #
  # (a) data 평문 — 본 파일 자체를 gitignore 하고 직접 채운다.
  secret:
    data:
      DATABASE_USERNAME: "<DB_USERNAME>"
      DATABASE_PASSWORD: "<DB_PASSWORD>"
      SYSTEM_TOKEN: "<SYSTEM_TOKEN>"
      # ACS_API_KEY: "<ACS_API_KEY>"   # AUTHORIZATION_ENABLED=true 일 때만

      # secret 도메인 (KMS / Secrets Manager) — KMS_KEY_ID / AWS_REGION_NAME 은
      # core 의 SecretSettings 가 명시 참조. AWS_ACCESS_KEY_ID /
      # AWS_SECRET_ACCESS_KEY 는 boto3 standard credential chain 이 자동 인식.
      KMS_KEY_ID: "<KMS_KEY_ARN>"
      AWS_REGION_NAME: "ap-northeast-2"
      AWS_ACCESS_KEY_ID: "<AWS_ACCESS_KEY_ID>"
      AWS_SECRET_ACCESS_KEY: "<AWS_SECRET_ACCESS_KEY>"

  # (b) 외부 Secret 참조 — 위의 secret.data 와 둘 중 하나만 사용한다.
  #     existingSecret 이 비어있지 않으면 chart 는 자체 Secret 을 만들지 않는다.
  # secret:
  #   existingSecret: cloudops-core-secret

# ── SeaweedFS (Temporal claim-check object storage) ───────────────────────────
# 서비스명 `seaweedfs` 가 곧 S3 엔드포인트 (seaweedfs.<ns>:8333) — 소비자 env 불필요.
# umbrella values.yaml 에서 enabled:true. 환경별로 채워야 하는 값만 아래에 override.
seaweedfs:
  # image:
  #   tag: "<SEAWEEDFS_TAG>"        # 필요 시 이미지 버전 override
  # persistence:
  #   size: 10Gi                     # 데이터 볼륨 크기

  s3:
    auth:
      # (a) dev — chart 가 s3.config Secret 을 생성. 실 secretKey 는 여기(gitignore)에만.
      identities:
        - name: claimcheck
          accessKey: cloudops-claimcheck
          secretKey: "<SEAWEEDFS_SECRET_KEY>"    # openssl rand -base64 32
          actions: [Read, Write, List]
      # (b) prod/인증 — ESO 가 만든 Secret 참조. 지정 시 위 identities 무시(Secret 미생성).
      # existingSecret: seaweedfs-s3-secret

# 참고: claim-check 소비자(core/plugin temporal 워커)는 위와 동일한
# accessKey/secretKey 를 S3 클라이언트 자격증명으로 필요로 한다 (SDK-direct 로
# cloudops/dev/secrets/app 또는 core.secret.data 에 주입 — base codec 설정명에 맞춰).
