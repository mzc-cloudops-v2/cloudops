{{- if and .Values.enabled .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "core.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "core.labels" . | indent 4 }}
  annotations:
    # pre-install hook 인 migration Job 의 serviceAccountName 참조보다 먼저
    # 만들어져야 하므로 SA 도 hook 으로 처리하고 weight 를 더 작게 둔다
    # (Job 의 weight 가 -1). hook-delete-policy 는 생략 — release 사이클을
    # 넘어 SA 가 남아야 deployment 가 정상 참조한다.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
{{- if and .Values.global .Values.global.serviceAccount .Values.global.serviceAccount.roleArn }}
    eks.amazonaws.com/role-arn: {{ .Values.global.serviceAccount.roleArn | quote }}
{{- end }}
{{- with .Values.serviceAccount.annotations }}
{{ toYaml . | indent 4 }}
{{- end }}
{{- end }}
