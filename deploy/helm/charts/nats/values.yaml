enabled: true

image:
  repository: nats
  pullPolicy: IfNotPresent

ports:
  client: 4222
  monitoring: 8222

service:
  type: ClusterIP
  ports:
    - name: client
      port: 4222
      targetPort: 4222
      protocol: TCP
    - name: monitoring
      port: 8222
      targetPort: 8222
      protocol: TCP
