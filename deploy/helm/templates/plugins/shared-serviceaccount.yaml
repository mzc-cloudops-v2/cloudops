{{- /*
공유 plugin ServiceAccount — collector 들은 serviceAccount.create:false 로 이 SA 를
"참조만" 하므로, umbrella 가 plugin namespace 에 직접 하나 생성한다.
global.serviceAccount.name 이 설정된 배포에서만 렌더 (미설정 시 각 플러그인 자체 SA).
*/ -}}
{{- if and .Values.global .Values.global.serviceAccount .Values.global.serviceAccount.name }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.global.serviceAccount.name }}
  namespace: {{ printf "%s-plugin" .Values.global.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- if .Values.global.serviceAccount.roleArn }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.global.serviceAccount.roleArn | quote }}
  {{- end }}
{{- end }}
