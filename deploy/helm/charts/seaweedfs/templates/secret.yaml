{{- if and .Values.enabled (not .Values.s3.auth.existingSecret) }}
{{- /*
  existingSecret 이 없을 때만 chart 가 s3.config Secret 을 생성한다 (dev).
  운영/인증은 existingSecret(예: ESO 가 만든 seaweedfs-s3-secret)을 지정하고
  이 블록은 렌더되지 않게 하는 것을 권장 — values 에 실 secretKey 를 두지 않기 위함.
*/}}
{{- $identities := list }}
{{- range .Values.s3.auth.identities }}
{{- $identities = append $identities (dict "name" .name "credentials" (list (dict "accessKey" .accessKey "secretKey" .secretKey)) "actions" .actions) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: seaweedfs-s3-config
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
{{ include "cloudops.labels" . | indent 4 }}
    cloudops.service: seaweedfs
type: Opaque
stringData:
  {{ .Values.s3.auth.configKey }}: {{ dict "identities" $identities | toJson | quote }}
{{- end }}
