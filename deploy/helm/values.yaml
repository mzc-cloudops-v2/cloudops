# CloudOps Umbrella Helm Values
#
# core / nats / redis / seaweedfs 는 charts/ 로컬 subchart, plugin 은
# templates/plugins/ 가 아래 plugins 맵을 렌더한다. 이미지 태그·시크릿 등
# 배포값은 -f values-deploy.yaml 로 override.

# 전역 공용 값 (subchart / plugin 공유)
global:
  namespace: "cloudops"
  # 배포값에서 주입:
  #   serviceAccount: { name: "cloudops", roleArn: "arn:aws:iam::<acct>:role/<role>" }  # 공유 SA + IRSA
  #   pluginRoleArn: "arn:aws:iam::<acct>:role/<role>"     # (구) plugin IRSA
  #   secretsManagerName: "cloudops/prod"                  # SDK-direct 스위치
  #   secretsManagerRegion: "ap-northeast-2"

# 인프라 subchart
redis:
  enabled: true

nats:
  enabled: true

# SeaweedFS (all-in-one) — Temporal claim-check object storage
seaweedfs:
  enabled: true

# core (monolith subchart)
core:
  enabled: true
  migration:
    enabled: false
  # Temporal claim-check codec (비민감값만; access/secret 키는 SM 에서 SDK-direct)
  env:
    TEMPORAL_CLAIMCHECK_ENABLED: "true"
    TEMPORAL_CLAIMCHECK_ENDPOINT_URL: "http://seaweedfs.cloudops:8333"
    TEMPORAL_CLAIMCHECK_BUCKET: "cloudops-claimcheck"
    TEMPORAL_CLAIMCHECK_REGION: "us-east-1"

# plugin 공통 기본값 — 모든 plugins.* 에 merge (플러그인 블록 값이 우선)
pluginDefaults:
  enabled: true
  replicas: 1
  image:
    repository: ""             # 배포값에서 주입
    tag: "latest"
    pullPolicy: IfNotPresent
  env:
    LOG_LEVEL: "INFO"
  nodeSelector:
    category: plugin
  natsConsumer:
    enabled: true              # 메인 NATS 워커 on/off
  temporal:
    enabled: false             # Temporal 사용(=env 에 TEMPORAL_ADDRESS 주입). collector 만 true
  temporalWorker:
    enabled: false             # Temporal 워커 파드 on/off
  serviceAccount:
    create: true               # 자체 SA 생성 (collector 는 공유 SA 참조라 false override)
    name: ""
    annotations: {}

# plugins — 블록엔 고유값만 (나머지 pluginDefaults 상속)
plugins:
  # ── collectors — 공유 SA 참조(create:false), provider env + claim-check + temporal-worker 옵션 ──
  aws-resource-collector:
    serviceAccount:
      create: false
    temporal:
      enabled: true
    env:
      AWS_CONNECT_TIMEOUT: "5"
      AWS_READ_TIMEOUT: "30"
      AWS_MAX_ATTEMPTS: "10"
      AWS_ALLOWED_REGIONS: ""
      AWS_EXCLUDED_REGIONS: ""
      TEMPORAL_NAMESPACE: "default"
      TEMPORAL_CLAIMCHECK_ENABLED: "true"
      TEMPORAL_CLAIMCHECK_ENDPOINT_URL: "http://seaweedfs.cloudops:8333"
      TEMPORAL_CLAIMCHECK_BUCKET: "cloudops-claimcheck"
      TEMPORAL_CLAIMCHECK_REGION: "us-east-1"

  azure-resource-collector:
    serviceAccount:
      create: false
    temporal:
      enabled: true
    env:
      TEMPORAL_NAMESPACE: "default"
      TEMPORAL_CLAIMCHECK_ENABLED: "true"
      TEMPORAL_CLAIMCHECK_ENDPOINT_URL: "http://seaweedfs.cloudops:8333"
      TEMPORAL_CLAIMCHECK_BUCKET: "cloudops-claimcheck"
      TEMPORAL_CLAIMCHECK_REGION: "us-east-1"

  gcp-resource-collector:
    serviceAccount:
      create: false
    temporal:
      enabled: true
    env:
      GCP_CONNECT_TIMEOUT: "5"
      GCP_READ_TIMEOUT: "30"
      GCP_MAX_RETRIES: "3"
      TEMPORAL_NAMESPACE: "default"
      TEMPORAL_CLAIMCHECK_ENABLED: "true"
      TEMPORAL_CLAIMCHECK_ENDPOINT_URL: "http://seaweedfs.cloudops:8333"
      TEMPORAL_CLAIMCHECK_BUCKET: "cloudops-claimcheck"
      TEMPORAL_CLAIMCHECK_REGION: "us-east-1"

  # ── webhooks — 자체 SA(create:true 상속), env=LOG_LEVEL(상속) ──
  aws-phd-mon-webhook: {}
  aws-sns-mon-webhook:
    enabled: false
  email-noti-protocol: {}
  grafana-mon-webhook: {}
  prometheus-mon-webhook: {}
  aws-cloudwatch-mon-webhook: {}
