{{/*
Auto-create Namespace resources derived from `.Values.global.namespace`:

  1) `<global.namespace>` 자체 — release namespace 와 다를 때만 (helm install -n
     으로 따로 지정하는 경우가 있어, 같으면 helm 이 처리하도록 skip).
  2) `<global.namespace>-plugin` — plugin chart 가 helper 로 derive 하는 namespace.

각 Namespace 는 lookup 으로 cluster 에 이미 존재하면 render 를 skip 한다 — 외부에서
미리 만든 namespace 와 ownership 충돌이 나지 않도록.

추가로 `helm.sh/resource-policy: keep` annotation 을 박는다. 이미 cluster 에 만들어진
Namespace 가 다음 upgrade 에서 lookup 으로 manifest 에서 빠질 때, helm 의 prune 동작이
cluster 자원을 삭제하지 않도록 보호한다. (이전 사이클: 첫 upgrade 에서 ns 생성 →
두 번째 upgrade 에서 manifest 에 ns 없음 → helm 이 prune → ns 삭제 → 다음 upgrade
에서 lookup 다시 nil → render → 재생성 … 의 무한 toggle 문제 해결.)

global.namespace 가 비어 있으면 어떤 Namespace 도 만들지 않는다 (단독 release ns
배포로 간주, 사용자가 helm install --create-namespace 등으로 해결).
*/}}
{{- $globalNs := default "" .Values.global.namespace -}}
{{- if $globalNs -}}
{{- if and (ne $globalNs .Release.Namespace) (not (lookup "v1" "Namespace" "" $globalNs)) }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $globalNs | quote }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
{{- $pluginNs := printf "%s-plugin" $globalNs }}
{{- if and (ne $pluginNs .Release.Namespace) (not (lookup "v1" "Namespace" "" $pluginNs)) }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $pluginNs | quote }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
{{- end }}
