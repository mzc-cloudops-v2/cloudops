{{/*
Auto-create Namespace resources for any subchart that declares its own
`namespace` key in values.yaml and differs from the release namespace.

예시: `plugin-aws-resource-collector.namespace = cloudopsv2-plugin`.

릴리스 namespace 와 동일하면 helm 이 알아서 만들거나 `--create-namespace`
로 처리되므로 여기서 다시 만들지 않는다. 중복 namespace 는 한 번만 생성한다.
*/}}
{{- $seen := dict -}}
{{- range $key, $val := .Values -}}
{{- if kindIs "map" $val -}}
{{- $ns := index $val "namespace" -}}
{{- if and $ns (ne $ns $.Release.Namespace) (not (hasKey $seen $ns)) -}}
{{- $_ := set $seen $ns true -}}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $ns | quote }}
  labels:
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
{{- end -}}
{{- end -}}
{{- end -}}
