name: Make CloudOps Chart

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build chart from'
        required: false
        default: 'master'
        type: string
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: read

env:
  GHCR_ORG: mzc-cloudops-v2
  GHCR_PREFIX: charts

jobs:
  cloudops_chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          # chart-releaser 가 origin/gh-pages 를 참조하려면 모든 ref 가
          # 필요하다. fetch-depth=0 으로 전체 history + remote refs 를 받는다.
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Update Chart.yaml version
        run: |
          cd deploy/helm
          sed -i "s/^version:.*/version: ${{ inputs.version }}/" Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ inputs.version }}\"/" Chart.yaml
          echo "Updated Chart.yaml:"
          head -10 Chart.yaml

      - name: Commit version update
        run: |
          git config user.email "cloudops-admin@mz.co.kr"
          git config user.name "cloudops-admin"
          git add deploy/helm/Chart.yaml
          if git diff --staged --quiet; then
            echo "Chart.yaml already at ${{ inputs.version }} — skipping commit."
          else
            git commit -m "Bump cloudops chart version to ${{ inputs.version }}"
            git push origin ${{ inputs.branch }}
          fi

      - name: Login to GHCR
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Pull dependencies from GHCR
        run: |
          cd deploy/helm
          echo "Pulling all service chart dependencies from GHCR..."
          helm dependency update
          echo "Dependencies:"
          helm dependency list

      - name: Package CloudOps chart
        run: |
          rm -rf .deploy
          mkdir -p .deploy
          helm package deploy/helm --destination .deploy
          echo "Packaged cloudops chart:"
          ls -la .deploy/

      # chart-releaser 가 gh-pages 브랜치에 index.yaml 을 갱신하고,
      # 각 차트 tgz 를 GitHub Release 로 함께 발행한다. 사용자는
      #   helm repo add cloudops https://mzc-cloudops-v2.github.io/cloudops
      #   helm repo update
      #   helm install cloudops cloudops/cloudops --version <X.Y.Z>
      # 흐름으로 설치할 수 있다.
      #
      # 사전 준비 (한 번만): repo Settings → Pages → Source 를 `gh-pages` /
      # `/ (root)` 로 지정. chart-releaser 가 처음 돌면서 브랜치가 만들어진다.
      - name: Configure git identity for chart-releaser
        run: |
          git config user.email "cloudops-admin@mz.co.kr"
          git config user.name "cloudops-admin"

      - name: Publish chart to helm repo (gh-pages) + GitHub Release
        uses: helm/chart-releaser-action@v1.6.0
        with:
          skip_packaging: true
          skip_existing: true
          # mark_as_latest 의 action default 는 true 인데, v1.6.0 의 cr.sh
          # 는 이 분기에서 `latest_tag: unbound variable` 로 죽는다.
          # 줄 자체를 빼면 default true 가 적용되므로 반드시 false 로
          # 명시한다. GitHub Releases UI 는 가장 최근 tag 를 자동으로
          # latest 로 잡으므로 사용자 입장 동작은 동일.
          mark_as_latest: "false"
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_PACKAGE_PATH: .deploy

  notification:
    needs: cloudops_chart
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.cloudops_chart.result }}
          fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
          author_name: CloudOps Chart Builder
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_DEPLOY_HELM_NOTI_WEBHOOK_URL }}
